<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Slack Community Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }</style>
</head>
<body class="bg-[#F2F2F2] text-[#1A1A1A]">

    <header class="bg-white border-b border-gray-300 py-4 px-6 mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold border-l-4 border-[#0066FF] pl-3">Slack コミュニティ分析ダッシュボード</h1>
            <div class="flex gap-4">
                <button onclick="manualUpdate()" id="updateBtn" class="bg-[#0066FF] text-white px-4 py-2 rounded text-sm hover:bg-blue-700 transition">AI分析を手動実行</button>
                <span id="status" class="text-xs text-gray-500 self-center"></span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-12">
        <div class="bg-white p-8 rounded-sm shadow-sm mb-8 border-t-4 border-[#0066FF]">
            <h2 class="text-sm font-bold text-[#0066FF] mb-2 uppercase tracking-widest">Weekly AI Report</h2>
            <h3 class="text-2xl font-bold mb-4">今週の活動まとめ</h3>
            <p id="weekly-report" class="leading-relaxed text-gray-700 whitespace-pre-wrap">読み込み中...</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-6 rounded-sm shadow-sm">
                    <h3 class="font-bold mb-6 text-lg border-b pb-2">投稿者の属性分布</h3>
                    <div class="h-64"><canvas id="roleChart"></canvas></div>
                </div>

                <div class="bg-white p-6 rounded-sm shadow-sm">
                    <h3 class="font-bold mb-4 text-lg border-b pb-2">最新の投稿フィード</h3>
                    <div id="post-feed" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
                </div>
            </div>

            <div class="space-y-8">
                <div class="bg-[#0066FF] text-white p-6 rounded-sm shadow-sm">
                    <h3 class="font-bold mb-4 italic">Upcoming Events</h3>
                    <div id="event-list" class="space-y-4">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
